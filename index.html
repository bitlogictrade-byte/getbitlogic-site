<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GetBitLogic | 시장의 소음을 끄다</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ABeeZee:wght@400;700&family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-shell">
        <header class="hero-section">
            <div class="hero-copy">
                <p class="hero-eyebrow">Algorithm 검증 프리미엄 지표</p>
                <h1 class="hero-title">
                    <span id="rollingText" class="rolling-text">
                        <span class="line-white">시장의 소음을 끄다.</span><br>
                        <span class="line-gradient">본질에 몰입</span>
                    </span>
                </h1>
                <p class="hero-subtitle">
                    백테스팅을 거쳐 검증된 비트로직 알고리즘 (Algorithm)
                    <span class="hero-subtitle-break"></span>
                    더 이상 흔들리지 않는 본인만의 매매 기준을 만들어보세요.
                </p>
            </div>

            <section class="chart-panel">
                <div class="chart-card">
                    <div class="chart-image-wrap">
                        <img src="chart.png" alt="비트로직 차트" class="chart-image">
                        <div class="chart-glow"></div>
                    </div>
                    <p class="chart-note">자유로운 구독 해지 및 관리 | 부담 없이 시작하는 프리미엄 지표</p>
                </div>

                <div class="hero-actions">
                    <a href="#subscribe" class="btn btn-primary">1개월 구독하기</a>
                    <a href="#learn-more" class="btn btn-secondary">더 알아보기</a>
                </div>
            </section>
        </header>
    </div>

    <script src="script.js"></script>
</body>
</html>
