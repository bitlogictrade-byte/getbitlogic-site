<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#060a14">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <title>404 | BitLogic</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 24px;
            text-align: center;
        }
        .error-code {
            font-size: clamp(6rem, 20vw, 10rem);
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, var(--cyan) 0%, var(--blue) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.04em;
            margin-bottom: 0.4em;
            user-select: none;
        }
        .error-title {
            font-size: clamp(1.3rem, 3vw, 1.8rem);
            font-weight: 800;
            color: #fff;
            margin-bottom: 12px;
        }
        .error-desc {
            font-size: 0.95rem;
            color: var(--muted);
            line-height: 1.7;
            max-width: 380px;
            margin: 0 auto 40px;
        }
        .error-back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 13px 32px;
            background: var(--grad-btn);
            border-radius: 999px;
            color: #fff;
            font-size: 0.95rem;
            font-weight: 700;
            font-family: 'Noto Sans KR', sans-serif;
            text-decoration: none;
            transition: opacity 0.2s, transform 0.2s;
        }
        .error-back-btn:hover {
            opacity: 0.88;
            transform: translateY(-1px);
        }
        .error-logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 3rem;
            text-decoration: none;
        }
        .error-logo img {
            height: 32px;
            width: auto;
        }
        .error-logo-text {
            font-size: 1.1rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--cyan), var(--cyan2));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <div class="error-page">
        <a href="index.html" class="error-logo">
            <img src="btlogocl.png" alt="BitLogic">
            <span class="error-logo-text">BitLogic</span>
        </a>

        <p class="error-code">404</p>

        <h1 class="error-title">페이지를 찾을 수 없습니다</h1>
        <p class="error-desc">
            요청하신 페이지가 존재하지 않거나 이동되었습니다.<br>
            주소를 다시 확인하거나 메인 페이지로 돌아가세요.
        </p>

        <a href="index.html" class="error-back-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            메인으로 돌아가기
        </a>
    </div>
</body>
</html>
